name: Bootstrap Infrastructure

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: 'AWS region'
        required: true
        default: 'us-east-1'
        type: string
      action:
        description: 'Action to perform'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - force-unlock-only
          - oidc-only
          - secrets-only

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ inputs.aws_region }}
  AWS_ACCOUNT_ID_VALUE: ''
  TF_VERSION: '1.6.6'

jobs:
  bootstrap:
    name: Bootstrap AWS Infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (Bootstrap IAM User)
        run: |
          # Use bootstrap IAM user credentials (not OIDC — OIDC roles don't exist yet)
          echo "Configuring AWS credentials from bootstrap IAM user..."
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_BOOTSTRAP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_BOOTSTRAP_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}

      - name: Debug AWS Credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_BOOTSTRAP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_BOOTSTRAP_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
        run: |
          echo "=== Debug: Credential Format Check ==="
          KEY_ID="${AWS_ACCESS_KEY_ID}"
          SECRET="${AWS_SECRET_ACCESS_KEY}"
          echo "Access Key ID length: ${#KEY_ID}"
          echo "Access Key ID prefix: ${KEY_ID:0:4}..."
          echo "Access Key ID has whitespace: $(echo "$KEY_ID" | grep -cP '[\s\n\r]' || echo 0)"
          echo "Secret Access Key length: ${#SECRET}"
          echo "Secret Access Key has whitespace: $(echo "$SECRET" | grep -cP '[\s\n\r]' || echo 0)"
          echo "AWS_DEFAULT_REGION: $AWS_DEFAULT_REGION"
          echo ""
          # Trim potential whitespace/newlines
          CLEAN_KEY_ID=$(echo -n "$KEY_ID" | tr -d '[:space:]')
          CLEAN_SECRET=$(echo -n "$SECRET" | tr -d '[:space:]')
          echo "Cleaned Key ID length: ${#CLEAN_KEY_ID}"
          echo "Cleaned Secret length: ${#CLEAN_SECRET}"
          echo ""
          echo "Attempting aws sts get-caller-identity with cleaned creds..."
          AWS_ACCESS_KEY_ID="$CLEAN_KEY_ID" AWS_SECRET_ACCESS_KEY="$CLEAN_SECRET" \
            aws sts get-caller-identity --region "$AWS_DEFAULT_REGION" 2>&1 || echo "FAILED with cleaned creds too"

      - name: Verify AWS Identity
        id: identity
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_BOOTSTRAP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_BOOTSTRAP_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
        run: |
          set -euo pipefail
          # Trim any whitespace/newlines from secrets
          export AWS_ACCESS_KEY_ID=$(echo -n "$AWS_ACCESS_KEY_ID" | tr -d '[:space:]')
          export AWS_SECRET_ACCESS_KEY=$(echo -n "$AWS_SECRET_ACCESS_KEY" | tr -d '[:space:]')
          IDENTITY=$(aws sts get-caller-identity)
          echo "$IDENTITY" | jq .
          ACCOUNT_ID=$(echo "$IDENTITY" | jq -r '.Account')
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "AWS Account ID: $ACCOUNT_ID"

      - name: Setup Terraform
        if: inputs.action == 'full' || inputs.action == 'oidc-only'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── Step 1: Force-unlock stale DynamoDB state locks ──
      - name: Force-unlock stale Terraform state locks
        if: inputs.action == 'full' || inputs.action == 'force-unlock-only'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_BOOTSTRAP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_BOOTSTRAP_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
        run: |
          set -euo pipefail
          TABLE="eks-platform-tfstate-lock"

          if ! aws dynamodb describe-table --table-name "$TABLE" >/dev/null 2>&1; then
            echo "DynamoDB table $TABLE does not exist. Nothing to unlock."
            exit 0
          fi

          echo "Scanning DynamoDB table $TABLE for stale locks..."
          LOCKS=$(aws dynamodb scan --table-name "$TABLE" --output json)
          LOCK_COUNT=$(echo "$LOCKS" | jq '.Count')
          echo "Found $LOCK_COUNT lock entries"

          if [[ "$LOCK_COUNT" -gt 0 ]]; then
            echo "$LOCKS" | jq -r '.Items[].LockID.S' | while read -r lock_id; do
              echo "Deleting stale lock: $lock_id"
              aws dynamodb delete-item \
                --table-name "$TABLE" \
                --key "{\"LockID\": {\"S\": \"$lock_id\"}}"
            done
            echo "All stale locks cleared."
          else
            echo "No stale locks found."
          fi

      # ── Step 2: Ensure Terraform backend exists ──
      - name: Ensure Terraform backend (S3 + DynamoDB)
        if: inputs.action == 'full' || inputs.action == 'oidc-only'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_BOOTSTRAP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_BOOTSTRAP_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
        run: |
          set -euo pipefail
          REGION="${{ inputs.aws_region }}"

          for ENV in test staging prod; do
            BUCKET="eks-platform-tfstate-${ENV}"

            if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
              echo "Creating backend bucket: $BUCKET"
              if [[ "$REGION" == "us-east-1" ]]; then
                aws s3api create-bucket --bucket "$BUCKET"
              else
                aws s3api create-bucket --bucket "$BUCKET" \
                  --create-bucket-configuration LocationConstraint="$REGION"
              fi
              aws s3api put-bucket-versioning --bucket "$BUCKET" \
                --versioning-configuration Status=Enabled
              aws s3api put-public-access-block --bucket "$BUCKET" \
                --public-access-block-configuration \
                BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
            else
              echo "Backend bucket exists: $BUCKET"
            fi
          done

          TABLE="eks-platform-tfstate-lock"
          if ! aws dynamodb describe-table --table-name "$TABLE" >/dev/null 2>&1; then
            echo "Creating lock table: $TABLE"
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
            aws dynamodb wait table-exists --table-name "$TABLE"
          else
            echo "Lock table exists: $TABLE"
          fi

      # ── Step 3: Ensure KMS key alias exists ──
      - name: Ensure KMS key for Terraform state
        if: inputs.action == 'full' || inputs.action == 'oidc-only'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_BOOTSTRAP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_BOOTSTRAP_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
        run: |
          set -euo pipefail
          ALIAS="alias/eks-platform-tfstate"

          if aws kms describe-key --key-id "$ALIAS" >/dev/null 2>&1; then
            echo "KMS key alias $ALIAS already exists."
          else
            echo "Creating KMS key for Terraform state..."
            KEY_ID=$(aws kms create-key \
              --description "KMS key for eks-platform-tfstate" \
              --query 'KeyMetadata.KeyId' --output text)
            aws kms create-alias --alias-name "$ALIAS" --target-key-id "$KEY_ID"
            aws kms enable-key-rotation --key-id "$KEY_ID"
            echo "Created KMS key: $KEY_ID with alias $ALIAS"
          fi

      # ── Step 4: Create GitHub OIDC provider in AWS ──
      - name: Create GitHub OIDC Provider
        if: inputs.action == 'full' || inputs.action == 'oidc-only'
        id: oidc_provider
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_BOOTSTRAP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_BOOTSTRAP_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
        run: |
          set -euo pipefail

          OIDC_URL="https://token.actions.githubusercontent.com"
          ACCOUNT_ID="${{ steps.identity.outputs.account_id }}"

          # Check if OIDC provider already exists
          EXISTING=$(aws iam list-open-id-connect-providers --query \
            "OpenIDConnectProviderList[?ends_with(Arn, '/token.actions.githubusercontent.com')].Arn" \
            --output text)

          if [[ -n "$EXISTING" && "$EXISTING" != "None" ]]; then
            echo "GitHub OIDC provider already exists: $EXISTING"
            echo "oidc_arn=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            echo "Creating GitHub OIDC provider..."
            # Get thumbprint
            THUMBPRINT=$(openssl s_client -connect token.actions.githubusercontent.com:443 \
              -servername token.actions.githubusercontent.com < /dev/null 2>/dev/null | \
              openssl x509 -fingerprint -noout -sha1 | cut -d'=' -f2 | tr -d ':' | tr '[:upper:]' '[:lower:]')

            OIDC_ARN=$(aws iam create-open-id-connect-provider \
              --url "$OIDC_URL" \
              --client-id-list "sts.amazonaws.com" \
              --thumbprint-list "$THUMBPRINT" \
              --query 'OpenIDConnectProviderArn' --output text)

            echo "Created OIDC provider: $OIDC_ARN"
            echo "oidc_arn=$OIDC_ARN" >> "$GITHUB_OUTPUT"
          fi

      # ── Step 5: Create IAM roles for each environment ──
      - name: Create GitHub Actions IAM Roles (per environment)
        if: inputs.action == 'full' || inputs.action == 'oidc-only'
        id: roles
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_BOOTSTRAP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_BOOTSTRAP_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
        run: |
          set -euo pipefail

          ACCOUNT_ID="${{ steps.identity.outputs.account_id }}"
          OIDC_ARN="${{ steps.oidc_provider.outputs.oidc_arn }}"
          REPO="treboto-solvd/solvd-eks-platform-claude-test"
          REGION="${{ inputs.aws_region }}"

          create_role_for_env() {
            local env_name="$1"
            local role_name="eks-platform-github-actions-${env_name}"

            if aws iam get-role --role-name "$role_name" >/dev/null 2>&1; then
              local role_arn=$(aws iam get-role --role-name "$role_name" --query 'Role.Arn' --output text)
              echo "Role already exists: $role_arn"
              echo "role_arn_${env_name}=$role_arn" >> "$GITHUB_OUTPUT"
              return 0
            fi

            echo "Creating IAM role: $role_name"

            # Trust policy for GitHub OIDC
            cat > /tmp/trust-policy-${env_name}.json << TRUSTEOF
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Federated": "${OIDC_ARN}"
                },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
                  },
                  "StringLike": {
                    "token.actions.githubusercontent.com:sub": [
                      "repo:${REPO}:environment:${env_name}",
                      "repo:${REPO}:ref:refs/heads/main"
                    ]
                  }
                }
              }
            ]
          }
          TRUSTEOF

            local role_arn=$(aws iam create-role \
              --role-name "$role_name" \
              --assume-role-policy-document "file:///tmp/trust-policy-${env_name}.json" \
              --description "GitHub Actions role for eks-platform ${env_name} deployments" \
              --max-session-duration 3600 \
              --query 'Role.Arn' --output text)

            echo "Created role: $role_arn"

            # Attach managed policies for full EKS infrastructure management
            for policy_arn in \
              "arn:aws:iam::aws:policy/AmazonEKSClusterPolicy" \
              "arn:aws:iam::aws:policy/AmazonEC2FullAccess" \
              "arn:aws:iam::aws:policy/IAMFullAccess" \
              "arn:aws:iam::aws:policy/AmazonVPCFullAccess" \
              "arn:aws:iam::aws:policy/AmazonS3FullAccess" \
              "arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess" \
              "arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy"; do
              aws iam attach-role-policy --role-name "$role_name" --policy-arn "$policy_arn" || true
            done

            # Inline policy for EKS, KMS, CloudWatch, ECR, AutoScaling, ELB, STS
            cat > /tmp/inline-policy-${env_name}.json << POLICYEOF
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "EKSManagement",
                "Effect": "Allow",
                "Action": "eks:*",
                "Resource": "*"
              },
              {
                "Sid": "KMSManagement",
                "Effect": "Allow",
                "Action": [
                  "kms:CreateKey", "kms:CreateAlias", "kms:DescribeKey",
                  "kms:EnableKeyRotation", "kms:GetKeyPolicy", "kms:GetKeyRotationStatus",
                  "kms:ListAliases", "kms:ListKeys", "kms:PutKeyPolicy",
                  "kms:ScheduleKeyDeletion", "kms:ListResourceTags", "kms:TagResource",
                  "kms:UntagResource", "kms:Decrypt", "kms:Encrypt", "kms:GenerateDataKey",
                  "kms:ReEncrypt*", "kms:CreateGrant", "kms:RetireGrant", "kms:RevokeGrant",
                  "kms:DeleteAlias"
                ],
                "Resource": "*"
              },
              {
                "Sid": "CloudWatchLogs",
                "Effect": "Allow",
                "Action": [
                  "logs:CreateLogGroup", "logs:DeleteLogGroup", "logs:DescribeLogGroups",
                  "logs:ListTagsLogGroup", "logs:PutRetentionPolicy", "logs:TagLogGroup",
                  "logs:UntagLogGroup", "logs:ListTagsForResource", "logs:TagResource",
                  "logs:UntagResource"
                ],
                "Resource": "*"
              },
              {
                "Sid": "AutoScaling",
                "Effect": "Allow",
                "Action": "autoscaling:*",
                "Resource": "*"
              },
              {
                "Sid": "ELB",
                "Effect": "Allow",
                "Action": "elasticloadbalancing:*",
                "Resource": "*"
              },
              {
                "Sid": "ECR",
                "Effect": "Allow",
                "Action": "ecr:*",
                "Resource": "*"
              },
              {
                "Sid": "STS",
                "Effect": "Allow",
                "Action": [
                  "sts:GetCallerIdentity",
                  "sts:AssumeRole"
                ],
                "Resource": "*"
              },
              {
                "Sid": "TerraformState",
                "Effect": "Allow",
                "Action": [
                  "s3:GetObject", "s3:PutObject", "s3:DeleteObject",
                  "s3:ListBucket", "s3:GetBucketVersioning", "s3:HeadBucket",
                  "s3:CreateBucket", "s3:GetBucketLocation",
                  "s3:PutBucketVersioning", "s3:PutBucketPublicAccessBlock"
                ],
                "Resource": [
                  "arn:aws:s3:::eks-platform-tfstate-*",
                  "arn:aws:s3:::eks-platform-tfstate-*/*"
                ]
              },
              {
                "Sid": "DynamoDBLock",
                "Effect": "Allow",
                "Action": [
                  "dynamodb:GetItem", "dynamodb:PutItem", "dynamodb:DeleteItem",
                  "dynamodb:UpdateItem", "dynamodb:DescribeTable", "dynamodb:CreateTable"
                ],
                "Resource": "arn:aws:dynamodb:*:*:table/eks-platform-tfstate-lock"
              }
            ]
          }
          POLICYEOF

            aws iam put-role-policy \
              --role-name "$role_name" \
              --policy-name "eks-platform-operations" \
              --policy-document "file:///tmp/inline-policy-${env_name}.json"

            echo "role_arn_${env_name}=$role_arn" >> "$GITHUB_OUTPUT"
          }

          create_role_for_env "test"
          create_role_for_env "staging"
          create_role_for_env "prod"

      # ── Step 6: Set GitHub environment secrets ──
      - name: Set GitHub Environment Secrets
        if: inputs.action == 'full' || inputs.action == 'secrets-only'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          ACCOUNT_ID="${{ steps.identity.outputs.account_id }}"
          REPO="treboto-solvd/solvd-eks-platform-claude-test"

          # Set AWS_ACCOUNT_ID as repo-level secret
          echo "$ACCOUNT_ID" | gh secret set AWS_ACCOUNT_ID --repo "$REPO"
          echo "Set repo secret: AWS_ACCOUNT_ID=$ACCOUNT_ID"

          # Set environment-specific role ARNs
          for env_name in test staging prod; do
            ROLE_NAME="eks-platform-github-actions-${env_name}"
            ROLE_ARN=$(aws iam get-role --role-name "$ROLE_NAME" --query 'Role.Arn' --output text 2>/dev/null || true)

            if [[ -z "$ROLE_ARN" || "$ROLE_ARN" == "None" ]]; then
              echo "WARNING: Role $ROLE_NAME not found. Skipping secret for $env_name."
              continue
            fi

            SECRET_NAME="AWS_ROLE_${env_name^^}"
            echo "$ROLE_ARN" | gh secret set "$SECRET_NAME" --repo "$REPO" --env "$env_name"
            echo "Set env secret: $SECRET_NAME=$ROLE_ARN (env: $env_name)"

            echo "$ACCOUNT_ID" | gh secret set "AWS_ACCOUNT_ID" --repo "$REPO" --env "$env_name"
            echo "Set env secret: AWS_ACCOUNT_ID=$ACCOUNT_ID (env: $env_name)"
          done

          echo "All secrets configured successfully."

      # ── Step 7: Update terraform.tfvars with real account ID ──
      - name: Verify tfvars account IDs
        if: inputs.action == 'full'
        run: |
          ACCOUNT_ID="${{ steps.identity.outputs.account_id }}"
          echo "Checking terraform.tfvars files for placeholder account IDs..."

          NEEDS_FIX=false
          for env_dir in terraform/environments/*/; do
            TFVARS="${env_dir}terraform.tfvars"
            if grep -q "123456789012" "$TFVARS" 2>/dev/null; then
              echo "WARNING: $TFVARS still has placeholder account ID."
              echo "The CI/CD pipeline passes -var='aws_account_id=...' from secrets, so this is OK."
              NEEDS_FIX=true
            fi
          done

          if [[ "$NEEDS_FIX" == "true" ]]; then
            echo ""
            echo "NOTE: terraform.tfvars contain placeholder account IDs (123456789012)."
            echo "This is expected — the CI/CD pipeline overrides via -var='aws_account_id=\${{ secrets.AWS_ACCOUNT_ID }}'."
            echo "The actual account ID ($ACCOUNT_ID) is now stored in GitHub Secrets."
          fi

      - name: Bootstrap Summary
        if: always()
        run: |
          echo "============================================"
          echo "  BOOTSTRAP COMPLETE"
          echo "============================================"
          echo ""
          echo "AWS Account:    ${{ steps.identity.outputs.account_id }}"
          echo "AWS Region:     ${{ inputs.aws_region }}"
          echo "OIDC Provider:  ${{ steps.oidc_provider.outputs.oidc_arn }}"
          echo ""
          echo "IAM Roles Created:"
          echo "  test:    ${{ steps.roles.outputs.role_arn_test }}"
          echo "  staging: ${{ steps.roles.outputs.role_arn_staging }}"
          echo "  prod:    ${{ steps.roles.outputs.role_arn_prod }}"
          echo ""
          echo "GitHub Secrets Set:"
          echo "  AWS_ACCOUNT_ID (repo-level)"
          echo "  AWS_ROLE_TEST (env: test)"
          echo "  AWS_ROLE_STAGING (env: staging)"
          echo "  AWS_ROLE_PROD (env: prod)"
          echo ""
          echo "Next: Trigger the CI/CD pipeline!"
          echo "  gh workflow run ci-cd-pipeline.yml"
          echo "============================================"
