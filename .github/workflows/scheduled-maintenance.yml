name: Scheduled Maintenance

on:
  schedule:
    # Drift detection: daily at 06:00 UTC
    - cron: '0 6 * * *'
    # Dependency updates: every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: true
        default: 'all'
        type: choice
        options: [all, drift, deps]
      environment:
        description: 'Environment for drift check (leave empty for all)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (no changes applied)'
        required: false
        default: true
        type: boolean

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: 'us-east-1'
  TF_VERSION: '1.6.6'
  TF_IN_AUTOMATION: 'true'
  TF_INPUT: 'false'

# ──────────────────────────────────────────────
# Job 1: Terraform Drift Detection & Remediation
# ──────────────────────────────────────────────
jobs:
  drift-remediation:
    name: Drift Detection & Remediation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Run on schedule (daily) or manual dispatch targeting drift/all
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.task == 'drift' || inputs.task == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '0 6 * * *'

    strategy:
      fail-fast: false
      matrix:
        environment: [test, staging]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials — test
        if: matrix.environment == 'test'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TEST }}
          role-session-name: DriftDetection-Test-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS Credentials — staging
        if: matrix.environment == 'staging'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_STAGING }}
          role-session-name: DriftDetection-Staging-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform -chdir=terraform/environments/${{ matrix.environment }} init

      - name: Run Drift Remediation Agent
        id: drift
        run: |
          chmod +x scripts/drift-remediation-agent.sh

          DRY_RUN_FLAG=""
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          scripts/drift-remediation-agent.sh $DRY_RUN_FLAG
        env:
          ENVIRONMENT: ${{ matrix.environment }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ env.AWS_REGION }}
          DRIFT_AUTO_APPLY: ${{ vars.DRIFT_AUTO_APPLY || 'false' }}

      - name: Upload Drift Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drift-report-${{ matrix.environment }}
          path: artifacts/drift-remediation-report.json
          retention-days: 14

# ──────────────────────────────────────────────
# Job 2: Dependency Update Check & PR Creation
# ──────────────────────────────────────────────
  dependency-updates:
    name: Dependency Update Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Run on schedule (Sundays) or manual dispatch targeting deps/all
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.task == 'deps' || inputs.task == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '0 2 * * 0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN || github.token }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'
        continue-on-error: true

      - name: Configure AWS Credentials (for addon version checks)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TEST }}
          role-session-name: DependencyCheck-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
        continue-on-error: true

      - name: Run Dependency Update Agent
        id: deps
        run: |
          chmod +x scripts/dependency-update-agent.sh

          DRY_RUN_FLAG=""
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          scripts/dependency-update-agent.sh $DRY_RUN_FLAG
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-update-report
          path: artifacts/dependency-update-report.json
          retention-days: 14

      - name: Summary
        if: always()
        run: |
          echo "## Dependency Update Report" >> "$GITHUB_STEP_SUMMARY"
          if [[ -f artifacts/dependency-update-report.json ]]; then
            UPDATE_COUNT=$(jq '.update_count // 0' artifacts/dependency-update-report.json)
            HAS_UPDATES=$(jq '.has_updates // false' artifacts/dependency-update-report.json)
            echo "**Updates found:** $UPDATE_COUNT" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            if [[ "$HAS_UPDATES" == "true" ]]; then
              echo "| Component | Category | Current | Latest |" >> "$GITHUB_STEP_SUMMARY"
              echo "|-----------|----------|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
              jq -r '.updates[] | "| \(.component) | \(.category) | \(.current) | \(.latest) |"' \
                artifacts/dependency-update-report.json >> "$GITHUB_STEP_SUMMARY" || true
            fi
          fi

# ──────────────────────────────────────────────
# Job 3: Maintenance Summary
# ──────────────────────────────────────────────
  maintenance-summary:
    name: Maintenance Summary
    runs-on: ubuntu-latest
    needs: [drift-remediation, dependency-updates]
    if: always()
    steps:
      - name: Download All Reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports/
        continue-on-error: true

      - name: Generate Summary
        run: |
          echo "## Scheduled Maintenance Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Drift Detection (test) | ${{ needs.drift-remediation.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dependency Updates | ${{ needs.dependency-updates.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Run: ${{ github.run_id }} — Triggered by: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
